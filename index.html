  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

stone-soft: #F0EEE6;  /* subtle fills, inactive tab background */\n  --cool-gray: #97A4AD;       /* muted metadata, disabled states */\n  --green: #5BA552;           /* category: Health & Life Sciences */\n  --teal: #1F8A8A;            /* category: Emerging Tech */\n  --paper: #FFFFFF;           /* working canvas */\n  --ink: #2B3238;             /* default text (near-charcoal) */\n  --hair: #E4E0D5;            /* hairline borders / dividers */\n\n  /* ===== Semantic aliases ===== */\n  --surface-page: var(--paper);\n  --surface-hero: var(--orange);\n  --surface-dark: var(--charcoal);\n  --surface-card: var(--paper);\n  --surface-muted: var(--limestone-soft);\n  --surface-warm: var(--limestone);\n\n  --text-body: var(--ink);\n  --text-strong: var(--charcoal);\n  --text-muted: #55606A;\n  --text-faint: var(--cool-gray);\n  --text-on-orange: #FFFFFF;\n  --text-on-dark: #FFFFFF;\n  --text-on-dark-muted: #D4D8DB;\n  --text-link: var(--orange-deep);\n  --text-heading: var(--orange);\n\n  --accent-on-dark: var(--orange-bright);   /* the only orange that survives on charcoal */\n  --border-hair: var(--hair);\n  --focus-ring: var(--orange);\n\n  /* ===== Category color set (color + REQUIRED text label) ===== */\n  --cat-materials: var(--orange);      /* Advanced Materials */\n  --cat-energy: var(--orange-bright);  /* Energy Solutions */\n  --cat-emerging: var(--teal);         /* Emerging Tech */\n  --cat-health: var(--green);          /* Health & Life Sciences */\n}\n<\u002Fstyle>\n  <style>/* D2I typography tokens. Heavy grotesque for everything; italic serif for pull quotes only. */\n:root {\n  --font-sans: 'Libre Franklin', -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;\n  --font-serif: 'Fraunces', Georgia, 'Times New Roman', serif;\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n  --fw-heavy: 800; /* @kind font */\n  --fw-black: 900; /* @kind font */\n\n  /* Display / heading tracking + leading */\n  --lh-display: 1.02; /* @kind font */\n  --lh-heading: 1.1; /* @kind font */\n  --lh-body: 1.6; /* @kind font */\n  --ls-display: 0.01em;\n  --ls-eyebrow: 0.13em;\n\n  /* Role composites */\n  --type-display: var(--fw-black) clamp(30px, 5vw, 52px) / var(--lh-display) var(--font-sans);\n  --type-h2: var(--fw-black) clamp(22px, 3.4vw, 32px) / 1.05 var(--font-sans);\n  --type-h3: var(--fw-heavy) 18px / 1.2 var(--font-sans);\n  --type-eyebrow: var(--fw-heavy) 11px / 1 var(--font-sans);\n  --type-body: var(--fw-regular) 15px / var(--lh-body) var(--font-sans);\n  --type-quote: var(--fw-regular) 22px / 1.4 var(--font-serif);\n}\n<\u002Fstyle>\n  <style>/* D2I spacing (4px base) + radii + elevation. The report breathes — be generous. */\n:root {\n  --sp-1: 4px;\n  --sp-2: 8px;\n  --sp-3: 12px;\n  --sp-4: 16px;\n  --sp-5: 24px;\n  --sp-6: 32px;\n  --sp-7: 48px;\n  --sp-8: 64px;\n\n  --section-pad: 56px;   /* vertical section padding */\n  --page-gutter: 32px;   /* page gutter */\n  --measure: 65ch;       /* body max line length */\n\n  /* Radii */\n  --r-pill: 999px;   /* tags, tabs, buttons, number pills */\n  --r-card: 16px;    /* cards, panels, callouts */\n  --r-photo: 18px;   /* image frames */\n  --r-chip: 8px;     /* small limestone chips */\n\n  /* Elevation — soft charcoal-tinted lift */\n  --shadow-card: 0 8px 24px rgba(50, 63, 72, 0.12);\n  --shadow-soft: 0 2px 8px rgba(50, 63, 72, 0.08);\n\n  /* Motion */\n  --ease: 0.18s cubic-bezier(0.2, 0, 0.2, 1); /* @kind other */\n}\n<\u002Fstyle>\n  <style>/* D2I Design System — global entry point. Consumers link this one file.\n   Keep this file as @import lines only. */\n/* D2I webfonts — Google Fonts substitutes for UT's licensed Benton Sans + report serif.\n   SUBSTITUTION: Libre Franklin ≈ Benton Sans; Fraunces italic ≈ report pull-quote serif.\n   Swap these @font-face imports for the licensed families when available. */\n/* vietnamese */\n@font-face {\n  f : var(--charcoal);\n  --surface-card: var(--paper);\n  --surface-muted: var(--limestone-soft);\n  --surface-warm: var(--limestone);\n\n  --text-body: var(--ink);\n  --text-strong: var(--charcoal);\n  --text-muted: #55606A;\n  --text-faint: var(--cool-gray);\n  --text-on-orange: #FFFFFF;\n  --text-on-dark: #FFFFFF;\n  --text-on-dark-muted: #D4D8DB;\n  --text-link: var(--orange-deep);\n  --text-heading: var(--orange);\n\n  --accent-on-dark: var(--orange-bright);   /* the only orange that survives on charcoal */\n  --border-hair: var(--hair);\n  --focus-ring: var(--orange);\n\n  /* ===== Category color set (color + REQUIRED text label) ===== */\n  --cat-materials: var(--orange);      /* Advanced Materials */\n  --cat-energy: var(--orange-bright);  /* Energy Solutions */\n  --cat-emerging: var(--teal);         /* Emerging Tech */\n  --cat-health: var(--green);          /* Health & Life Sciences */\n}\n\n/* D2I typography tokens. Heavy grotesque for everything; italic serif for pull quotes only. */\n:root {\n  --font-sans: 'Libre Franklin', -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;\n  --font-serif: 'Fraunces', Georgia, 'Times New Roman', serif;\n\n  /* Weights */\n  --fw-regular: 400; /* @kind font */\n  --fw-medium: 500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700; /* @kind font */\n  --fw-heavy: 800; /* @kind font */\n  --fw-black: 900; /* @kind font */\n\n  /* Display / heading tracking + leading */\n  --lh-display: 1.02; /* @kind font */\n  --lh-heading: 1.1; /* @kind font */\n  --lh-body: 1.6; /* @kind font */\n  --ls-display: 0.01em;\n  --ls-eyebrow: 0.13em;\n\n  /* Role composites */\n  --type-display: var(--fw-black) clamp(30px, 5vw, 52px) / var(--lh-display) var(--font-sans);\n  --type-h2: var(--fw-black) clamp(22px, 3.4vw, 32px) / 1.05 var(--font-sans);\n  --type-h3: var(--fw-heavy) 18px / 1.2 var(--font-sans);\n  --type-eyebrow: var(--fw-heavy) 11px / 1 var(--font-sans);\n  --type-body: var(--fw-regular) 15px / var(-- t:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Activities<\u002Fdiv>\n              <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Turn pilots into repeatable revenue<\u002Fspan> — standardize pricing, contracts, and delivery so deals stop being bespoke.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Scale production or deployment<\u002Fspan> — build the manufacturing, supply-chain, or delivery capacity to serve demand beyond pilots.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Make the first commercial hires<\u002Fspan> — move sales and business development beyond the founding team.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Layer follow-on capital<\u002Fspan> — sequence Phase II/III awards, contracts, and partnerships alongside equity, managed toward the metrics the next round will demand.<\u002Fspan><\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Resources<\u002Fdiv>\n              <ol style=\"list-style:none; margin:0; padding:0; display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:9px 24px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">01<\u002Fspan><a href=\"https://www.sbir.gov/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">SBIR/STTR Phase II &amp; Phase III<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">02<\u002Fspan><a href=\"https://discoverytoimpact.utexas.edu/industry/industrial-affiliates-programs/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Discovery to Impact — Industry Partnerships<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">03<\u002Fspan><a href=\"https://discoverytoimpact.utexas.edu/who-we-are/team/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Investor Connections: Discovery to Impact — Longhorn Ventures<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">04<\u002Fspan><span style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep); text-decoration:underline; text-underline-offset:2px;\">Government &amp; Defense Contracts<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">05<\u002Fspan><a href=\"https://gradcareer.utexas.edu/employers\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Recruiting — Office of Career &amp; Life Design<\u002Fa><\u002Fli>\n                              <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">06<\u002Fspan><a href=\"https://www.openvc.app/investor-lists/series-a-investors\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Growth Stage VC<\u002Fa><\u002Fli>\n              <\u002Fol>\n            <\u002Fdiv>\n            \n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <sc-if value=\"{{ showResourceStrip }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:840px; margin:0 auto; padding:32px var(--page-gutter);\">\n      <div style=\"background:var(--limestone); border-radius:var(--r-card); padding:20px 24px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;\">\n        <span aria-hidden=\"true\" style=\"flex: 0 0 auto; font-weight: 900; font-size: 18px; line-height: 1; color: var(--charcoal);\">›&nbsp;<span style=\"color: var(--charcoal); font-size: 14px; font-weight: 400; font-family: var(--font-sans);\">See the <\u002Fspan><a href=\"https://giant-license-735.notion.site/67444856b49b83219e7081717af62882?v=23944856b49b82b3aca38842942fb6c6&amp;source=copy_link\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"scp4\" style=\"font-size: 14px; font-family: var(--font-sans);\">UT Austin Venture Resource Guide<\u002Fa><span style=\"color: var(--charcoal); font-size: 14px; font-weight: 400; font-family: var(--font-sans);\">&nbsp;<\u002Fspan><span style=\"font-size: 14px; font-weight: 400;\">&nbsp;for an expanded list of stage-based resources.&nbsp;<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fsc-if>\n  <sc-if value=\"{{ isStartup }}\" hint-placeholder-val=\"{{ false }}\"><main style=\"max-width:840px; margin:0 auto; padding:48px var(--page-gutter) 8px;\">\n\n    <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:16px;\">\n      <div style=\"font-weight:800; font-size:11px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep);\">Stage Detail<\u002Fdiv>\n      <div style=\"display:flex; gap:8px;\">\n        <x-import component-from-global-scope=\"DiscoveryToImpactDesignSystem_b73f38.Button\" variant=\"ghost\" size=\"sm\" on-click=\"{{ uexpandAll }}\" hint-size=\"96px,34px\">Expand all<\u002Fx-import>\n        <x-import component-from-global-scope=\"DiscoveryToImpactDesignSystem_b73f38.Button\" variant=\"ghost\" size=\"sm\" on-click=\"{{ ucollapseAll }}\" hint-size=\"100px,34px\">Collapse all<\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex; flex-direction:column; gap:12px;\">\n\n      <div id=\"ustage-0\" data-stage-card=\"\" style=\"background:var(--surface-card); border:1px solid var(--hair); border-radius:var(--r-card); transition:box-shadow var(--ease), transform var(--ease), border-color var(--ease);\" style-hover=\"transform:translateY(-2px); box-shadow:var(--shadow-card); border-color:var(--orange-bright);\">\n        <button type=\"button\" aria-expanded=\"{{ uaria0 }}\" sc-camel-on-click=\"{{ utoggle0 }}\" style=\"display:flex; align-items:center; gap:14px; width:100%; text-align:left; font-family:var(--font-sans); background:transparent; border:0; border-radius:var(--r-card); padding:14px 16px; cursor:pointer;\" style-focus=\"outline:2px solid var(--focus-ring); outline-offset:-2px;\">\n          <span style=\"flex:0 0 auto; width:38px; height:38px; border-radius:var(--r-pill); background:var(--charcoal); color:#fff; font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center;\">01<\u002Fspan>\n          <span style=\"flex:1 1 auto; min-width:0;\">\n            <span style=\"display:block; font-weight:800; font-size:15px; line-height:1.2; text-transform:uppercase; color:var(--charcoal);\">Ideation<\u002Fspan>\n          <\u002Fspan>\n          <span aria-hidden=\"true\" style=\"flex:0 0 auto; width:30px; height:30px; border-radius:var(--r-pill); background:var(--limestone-soft); color:var(--charcoal); font-weight:800; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;\">{{ usign0 }}<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ u0 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border-top:1px solid var(--hair); padding:16px; display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"background:var(--limestone-soft); border-radius:var(--r-chip); padding:12px 14px;\">\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:6px;\">Exit Criteria →<\u002Fdiv>\n              <div style=\"font-family:var(--font-sans); font-style:italic; font-weight:400; font-size:14px; line-height:1.5; color:var(--charcoal);\">Committed founding team formed with an articulated problem hypothesis and a defined target customer.<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:7px;\">Definition<\u002Fdiv>\n              <p style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body); margin:0;\">Every venture starts with people, not product. This stage is about assembling a complementary founding team, converging on a problem worth solving, and committing to pursue it. The most common failure mode here isn’t a bad idea — it’s a team that never fully forms around one.<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Activities<\u002Fdiv>\n              <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Find your co-founders deliberately<\u002Fspan> — seek complementary skills and test the partnership on real work before committing.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Converge on a problem worth solving<\u002Fspan> — write a one-page problem hypothesis: who hurts, how badly, and why now.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Define your first target customer<\u002Fspan> — narrow to the segment that feels the problem most acutely.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Have the hard conversations early<\u002Fspan> — align on time commitment, roles, equity split, and vesting before the stakes rise.<\u002Fspan><\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Resources<\u002Fdiv>\n              <ol style=\"list-style:none; margin:0; padding:0; display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:9px 24px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">01<\u002Fspan><a href=\"https://www.mccombs.utexas.edu/centers-initiatives/brumley-institute/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Brumley Institute for Graduate Entrepreneurship<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">02<\u002Fspan><a href=\"https://www.joinef.com\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Entrepreneurs First<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">03<\u002Fspan><a href=\"https://herbkellehercenter.mccombs.utexas.edu/students/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Herb Kelleher Entrepreneurship Center (HKEC)<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">04<\u002Fspan><a href=\"https://www.mccombs.utexas.edu/centers-initiatives/harkey-institute-for-entrepreneurial-studies/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Harkey Institute for Entrepreneurial Studies<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">05<\u002Fspan><a href=\"https://kswelinstitute.utexas.edu/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Kendra Scott Women’s Entrepreneurial Leadership Institute<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">06<\u002Fspan><a href=\"https://www.mccombs.utexas.edu/centers-initiatives/global-sustainability-leadership-institute/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Global Sustainability Leadership Institute (GSLI)<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">07<\u002Fspan><a href=\"https://dellmed.utexas.edu/units/office-of-innovation-and-entrepreneurship/texas-health-catalyst\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Texas Health Catalyst<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">08<\u002Fspan><a href=\"https://utexas.app.box.com/v/EntrepreneursGuide\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">UT Entrepreneur’s Guide<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">09<\u002Fspan><a href=\"https://navigator.discoveries.utexas.edu/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">The Navigator<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">10<\u002Fspan><a href=\"https://utexas.box.com/v/HKEC-Ecosystem-Guide\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">UT Austin Startup Ecosystem Guide<\u002Fa><\u002Fli>\n              <\u002Fol>\n            <\u002Fdiv>\n            \n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div id=\"ustage-1\" data-stage-card=\"\" style=\"background:var(--surface-card); border:1px solid var(--hair); border-radius:var(--r-card); transition:box-shadow var(--ease), transform var(--ease), border-color var(--ease);\" style-hover=\"transform:translateY(-2px); box-shadow:var(--shadow-card); border-color:var(--orange-bright);\">\n        <button type=\"button\" aria-expanded=\"{{ uaria1 }}\" sc-camel-on-click=\"{{ utoggle1 }}\" style=\"display:flex; align-items:center; gap:14px; width:100%; text-align:left; font-family:var(--font-sans); background:transparent; border:0; border-radius:var(--r-card); padding:14px 16px; cursor:pointer;\" style-focus=\"outline:2px solid var(--focus-ring); outline-offset:-2px;\">\n          <span style=\"flex:0 0 auto; width:38px; height:38px; border-radius:var(--r-pill); background:var(--charcoal); color:#fff; font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center;\">02<\u002Fspan>\n          <span style=\"flex:1 1 auto; min-width:0;\">\n            <span style=\"display:block; font-weight:800; font-size:15px; line-height:1.2; text-transform:uppercase; color:var(--charcoal);\">Validation<\u002Fspan>\n          <\u002Fspan>\n          <span aria-hidden=\"true\" style=\"flex:0 0 auto; width:30px; height:30px; border-radius:var(--r-pill); background:var(--limestone-soft); color:var(--charcoal); font-weight:800; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;\">{{ usign1 }}<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ u1 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border-top:1px solid var(--hair); padding:16px; display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"background:var(--limestone-soft); border-radius:var(--r-chip); padding:12px 14px;\">\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:6px;\">Exit Criteria →<\u002Fdiv>\n              <div style=\"font-family:var(--font-sans); font-style:italic; font-weight:400; font-size:14px; line-height:1.5; color:var(--charcoal);\">Problem validated through structured customer discovery, with a defined ideal customer profile and early willingness-to-pay signals.<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:7px;\">Definition<\u002Fdiv>\n              <p style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body); margin:0;\">Many polished products die because no one wants to buy them. Before writing serious code, teams get out of the building and test the problem hypothesis directly with prospective customers — the I-Corps discipline of evidence over enthusiasm. The goal is a validated problem and a clear picture of who buys, why, and at what price.<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Activities<\u002Fdiv>\n              <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Interview prospective customers<\u002Fspan> — dozens of structured, non-leading conversations; ask about past behavior, not hypothetical interest.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Define your ideal customer profile<\u002Fspan> — from evidence: the segment, the role, and the trigger that makes them buy.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Test willingness to pay<\u002Fspan> — pricing conversations, pre-orders, or signed letters of intent beat compliments.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Decide: persevere, pivot, or stop<\u002Fspan> — hold a formal checkpoint against the evidence before you build.<\u002Fspan><\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Resources<\u002Fdiv>\n              <ol style=\"list-style:none; margin:0; padding:0; display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:9px 24px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">01<\u002Fspan><a href=\"https://swicorps.org/idealaunch/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">NSF Southwest I-Corps<\u00 Slicing Pie book<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">07<\u002Fspan><a href=\"https://stationaustin.org/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Station Austin<\u002Fa><\u002Fli>\n              <\u002Fol>\n            <\u002Fdiv>\n            \n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div id=\"ustage-2\" data-stage-card=\"\" style=\"background:var(--surface-card); border:1px solid var(--hair); border-radius:var(--r-card); transition:box-shadow var(--ease), transform var(--ease), border-color var(--ease);\" style-hover=\"transform:translateY(-2px); box-shadow:var(--shadow-card); border-color:var(--orange-bright);\">\n        <button type=\"button\" aria-expanded=\"{{ uaria2 }}\" sc-camel-on-click=\"{{ utoggle2 }}\" style=\"display:flex; align-items:center; gap:14px; width:100%; text-align:left; font-family:var(--font-sans); background:transparent; border:0; border-radius:var(--r-card); padding:14px 16px; cursor:pointer;\" style-focus=\"outline:2px solid var(--focus-ring); outline-offset:-2px;\">\n          <span style=\"flex:0 0 auto; width:38px; height:38px; border-radius:var(--r-pill); background:var(--charcoal); color:#fff; font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center;\">03<\u002Fspan>\n          <span style=\"flex:1 1 auto; min-width:0;\">\n            <span style=\"display:block; font-weight:800; font-size:15px; line-height:1.2; text-transform:uppercase; color:var(--charcoal);\">Build<\u002Fspan>\n          <\u002Fspan>\n          <span aria-hidden=\"true\" style=\"flex:0 0 auto; width:30px; height:30px; border-radius:var(--r-pill); background:var(--limestone-soft); color:var(--charcoal); font-weight:800; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;\">{{ usign2 }}<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ u2 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border-top:1px solid var(--hair); padding:16px; display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"background:var(--limestone-soft); border-radius:var(--r-chip); padding:12px 14px;\">\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:6px;\">Exit Criteria →<\u002Fdiv>\n              <div style=\"font-family:var(--font-sans); font-style:italic; font-weight:400; font-size:14px; line-height:1.5; color:var(--charcoal);\">Functioning MVP live with real users and demonstrable early demand (first paying customers, design partners, or a strong waitlist).<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:7px;\">Definition<\u002Fdiv>\n              <p style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body); margin:0;\">With the problem validated, the focus shifts to shipping a working product. The company is typically pre-revenue and lean by design, systematically retiring market risk (does anyone want this?) and product risk (can we build it?).<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Activities<\u002Fdiv>\n              <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Scope the smallest product that tests the value<\u002Fspan> — cut to the one workflow that proves people want this.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Recruit design partners<\u002Fspan> — a handful of target customers who use early versions and shape the roadmap.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Ship, instrument, iterate<\u002Fspan> — release in short cycles and let usage data and direct feedback drive what’s next.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Convert usage into demand proof<\u002Fspan> — first paying customers, signed pilots, or a waitlist that demonstrates pull.<\u002Fspan><\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Resources<\u002Fdiv>\n              <ol style=\"list-style:none; margin:0; padding:0; display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:9px 24px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">01<\u002Fspan><a href=\"https://www.sbir.gov\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">SBIR/STTR grants<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">02<\u002Fspan><a href=\"https://www.openvc.app/investor-lists/angel-investors\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Angel Investors<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">03<\u002Fspan><a href=\"https://txmomentum.org/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Texas Momentum<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">04<\u002Fspan><a href=\"https://ati.utexas.edu\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Austin Technology Incubator (ATI)<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">05<\u002Fspan><a href=\"https://www.genesisut.com/\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">UT Genesis<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">06<\u002Fspan><a href=\"https://www.f6s.com/contests/united-states\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Pitch Competitions<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">07<\u002Fspan><a href=\"https://www.amazon.com/Get-Backed-Perfect-Launch-Venture/dp/1633690725\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Get Backed book<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">08<\u002Fspan><a href=\"https://www.ycombinator.com/library/2u-how-to-build-your-seed-round-pitch-deck\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">YC How to build your seed round pitch deck<\u002Fa><\u002Fli>\n              <\u002Fol>\n            <\u002Fdiv>\n            \n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div id=\"ustage-3\" data-stage-card=\"\" style=\"background:var(--surface-card); border:1px solid var(--hair); border-radius:var(--r-card); transition:box-shadow var(--ease), transform var(--ease), border-color var(--ease);\" style-hover=\"transform:translateY(-2px); box-shadow:var(--shadow-card); border-color:var(--orange-bright);\">\n        <button type=\"button\" aria-expanded=\"{{ uaria3 }}\" sc-camel-on-click=\"{{ utoggle3 }}\" style=\"display:flex; align-items:center; gap:14px; width:100%; text-align:left; font-family:var(--font-sans); background:transparent; border:0; border-radius:var(--r-card); padding:14px 16px; cursor:pointer;\" style-focus=\"outline:2px solid var(--focus-ring); outline-offset:-2px;\">\n          <span style=\"flex:0 0 auto; width:38px; height:38px; border-radius:var(--r-pill); background:var(--charcoal); color:#fff; font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center;\">04<\u002Fspan>\n          <span style=\"flex:1 1 auto; min-width:0;\">\n            <span style=\"display:block; font-weight:800; font-size:15px; line-height:1.2; text-transform:uppercase; color:var(--charcoal);\">Seed<\u002Fspan>\n          <\u002Fspan>\n          <span aria-hidden=\"true\" style=\"flex:0 0 auto; width:30px; height:30px; border-radius:var(--r-pill); background:var(--limestone-soft); color:var(--charcoal); font-weight:800; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;\">{{ usign3 }}<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ u3 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border-top:1px solid var(--hair); padding:16px; display:flex; flex-direction:column; gap:16px;\">\n            <div style=\"background:var(--limestone-soft); border-radius:var(--r-chip); padding:12px 14px;\">\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:6px;\">Exit Criteria →<\u002Fdiv>\n              <div style=\"font-family:var(--font-sans); font-style:italic; font-weight:400; font-size:14px; line-height:1.5; color:var(--charcoal);\">Repeatable early traction: consistent multi-quarter revenue growth, strong retention, and a credible path to the Series A revenue bar.<\u002Fdiv>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:7px;\">Definition<\u002Fdiv>\n              <p style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body); margin:0;\">The company has moved beyond belief to a live product with engaged users and early revenue. The central quest is product-market fit — the market beginning to pull the product out of the team’s hands. Typical seed rounds now run $3–4M for roughly 20% dilution, increasingly raised as one larger priced round rather than several small checks.<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Activities<\u002Fdiv>\n              <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Find your repeatable motion<\u002Fspan> — identify the acquisition channel that reliably converts and concentrate on it.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Prove customers stay<\u002Fspan> — track cohort retention and expansion; churn undermines every growth story.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Raise the priced seed<\u002Fspan> — run a structured process with a deck, data room, and the metrics story that survives diligence.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Plan against the Series A bar<\u002Fspan> — set the milestones this round must fund over the next 18–24 months.<\u002Fspan><\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Resources<\u002Fdiv>\n              <ol style=\"list-style:none; margin:0; padding:0; display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:9px 24px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">01<\u002Fspan><a href=\"https://www.openvc.app/investor-lists/pre-seed-investors\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Early Stage VC<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">02<\u002Fspan><a href=\"https://seedfund.nsf.gov\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">SBIR/STTR Phase II<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">03<\u002Fspan><a href=\"https://www.openvc.app/investor-lists/incubators-accelerators\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Startup Accelerators<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">04<\u002Fspan><a href=\"https://www.openvc.app/investor-lists/angel-groups\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Angel Groups<\u002Fa><\u002Fli>\n              <\u002Fol>\n            <\u002Fdiv>\n            \n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n      <div id=\"ustage-5\" data-stage-card=\"\" style=\"background:var(--surface-card); border:1px solid var(--hair); border-radius:var(--r-card); transition:box-shadow var(--ease), transform var(--ease), border-color var(--ease);\" style-hover=\"transform:translateY(-2px); box-shadow:var(--shadow-card); border-color:var(--orange-bright);\">\n        <button type=\"button\" aria-expanded=\"{{ uaria5 }}\" sc-camel-on-click=\"{{ utoggle5 }}\" style=\"display:flex; align-items:center; gap:14px; width:100%; text-align:left; font-family:var(--font-sans); background:transparent; border:0; border-radius:var(--r-card); padding:14px 16px; cursor:pointer;\" style-focus=\"outline:2px solid var(--focus-ring); outline-offset:-2px;\">\n          <span style=\"flex:0 0 auto; width:38px; height:38px; border-radius:var(--r-pill); background:var(--charcoal); color:#fff; font-weight:800; font-size:15px; display:flex; align-items:center; justify-content:center;\">05<\u002Fspan>\n          <span style=\"flex:1 1 auto; min-width:0;\">\n            <span style=\"display:block; font-weight:800; font-size:15px; line-height:1.2; text-transform:uppercase; color:var(--charcoal);\">GROWTH<\u002Fspan>\n          <\u002Fspan>\n          <span aria-hidden=\"true\" style=\"flex:0 0 auto; width:30px; height:30px; border-radius:var(--r-pill); background:var(--limestone-soft); color:var(--charcoal); font-weight:800; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;\">{{ usign5 }}<\u002Fspan>\n        <\u002Fbutton>\n        <sc-if value=\"{{ u5 }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"border-top:1px solid var(--hair); padding:16px; display:flex; flex-direction:column; gap:16px;\">\n            \n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:7px;\">Definition<\u002Fdiv>\n              <p style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body); margin:0;\">The first major priced institutional round and beyond. Business is scaling with proven product-market fit. Investors here underwrite scaling risk, not existence risk: expect minimum $2–3M+ ARR, 100%+ net revenue retention, and a repeatable acquisition engine.<\u002Fp>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Activities<\u002Fdiv>\n              <ul style=\"list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:9px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Systematize the acquisition engine<\u002Fspan> — turn what works into hirable, repeatable playbooks for sales and marketing.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Defend net revenue retention<\u002Fspan> — invest in customer success and expansion so existing accounts help fund growth.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Build the leadership layer<\u002Fspan> — hire executives and managers, and move founders from doing to directing.<\u002Fspan><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span aria-hidden=\"true\" style=\"flex:0 0 auto; font-weight:900; font-size:13px; line-height:1.6; color:var(--cool-gray);\">›<\u002Fspan><span style=\"font-weight:400; font-size:14px; line-height:1.6; color:var(--text-body);\"><span style=\"font-weight:700; color:var(--charcoal);\">Raise institutional growth capital<\u002Fspan> — run a metrics-led process with the auditable growth story diligence demands.<\u002Fspan><\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div>\n              <div style=\"font-weight:800; font-size:10.5px; line-height:1; letter-spacing:0.13em; text-transform:uppercase; color:var(--orange-deep); margin-bottom:10px;\">Key Resources<\u002Fdiv>\n              <ol style=\"list-style:none; margin:0; padding:0; display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:9px 24px;\">\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">01<\u002Fspan><a href=\"https://www.openvc.app/investor-lists/series-a-investors\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Growth-stage VC<\u002Fa><\u002Fli>\n                <li style=\"display:flex; gap:10px; align-items:baseline;\"><span style=\"flex:0 0 auto; font-weight:700; font-size:11px; color:var(--cool-gray);\">02<\u002Fspan><a href=\"https://gradcareer.utexas.edu/employers\" target=\"_blank\" rel=\"noopener noreferrer\" style=\"font-size:13.5px; line-height:1.4; color:var(--orange-deep);\">Recruiting — Office of Career &amp; Life Design<\u002Fa><\u002Fli>\n              <\u002Fol>\n            <\u002Fdiv>\n            \n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <sc-if value=\"{{ showResourceStrip }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"max-width:840px; margin:0 auto; padding:32px var(--page-gutter);\">\n      <div style=\"background:var(--limestone); border-radius:var(--r-card); padding:20px 24px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;\">\n        <span aria-hidden=\"true\" style=\"flex: 0 0 auto; font-weight: 900; font-size: 18px; line-height: 1; color: var(--charcoal);\">›&nbsp;<span style=\"color: var(--charcoal); font-size: 14px; font-weight: 400; font-family: var(--font-sans);\">See the <\u002Fspan><a href=\"https://giant-license-735.notion.site/67444856b49b83219e7081717af62882?v=23944856b49b82b3aca38842942fb6c6&amp;source=copy_link\" target=\"_blank\" rel=\"noopener noreferrer\" class=\"scp2\" style=\"font-size: 14px; font-family: var(--font-sans);\">UT Austin Venture Resource Guide<\u002Fa><span style=\"color: var(--charcoal); font-size: 14px; font-weight: 400; font-family: var(--font-sans);\">&nbsp;for an expanded list of stage-based resources.&nbsp;<\u002Fspan><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <\u002Fsc-if>\n\n  <footer style=\"max-width:1080px; margin:0 auto; padding:8px var(--page-gutter) 48px; font-weight:500; font-size:12.5px; letter-spacing:0.04em; color:var(--text-faint);\">Questions? <a href=\"mailto:innovation@utexas.edu?subject=UT%20Venture%20Pipeline%20Inquiry\" data-om-id=\"4adaf902:570\" class=\"scp3\" style=\"color: var(--orange-deep); font-weight: 700;\">innovation@utexas.edu<\u002Fa><\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;showLogo&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Brand elements&quot; },\n  &quot;showHeroMotif&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Brand elements&quot; },\n  &quot;showResourceStrip&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Brand elements&quot; }\n}\">\nclass Component extends DCLogic {\n  state = { view: 'overview', sp: [false,false,false,false,false,false], su: [false,false,false,false,false,false] };\n  _valid(h){ return h==='overview'||h==='spinout'||h==='startup'; }\n  componentDidMount(){\n    try{ const h=(location.hash||'').replace('#',''); if(this._valid(h)) this.setState({view:h}); }catch(e){}\n    this._onhash=()=>{ try{ const x=(location.hash||'').replace('#',''); if(this._valid(x)) this.setState({view:x}); }catch(e){} };\n    window.addEventListener('hashchange', this._onhash);\n  }\n  componentWillUnmount(){ if(this._onhash) window.removeEventListener('hashchange', this._onhash); }\n  setView(v){ this.setState({view:v}); try{ if(('#'+v)!==location.hash) history.replaceState(null,'','#'+v); }catch(e){} }\n  setSp(i,val){ this.setState(s=>{const n=s.sp.slice(); n[i]=val; return {sp:n};}); }\n  setSu(i,val){ this.setState(s=>{const n=s.su.slice(); n[i]=val; return {su:n};}); }\n  goStage(track, idx){\n    const reduce = typeof window!=='undefined' && window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    this.setState(s=>{ const p={view:track}; if(track==='spinout'){ const n=s.sp.slice(); n[idx]=true; p.sp=n; } else { const n=s.su.slice(); n[idx]=true; p.su=n; } return p; });\n    try{ if(('#'+track)!==location.hash) history.replaceState(null,'','#'+track); }catch(e){}\n    const id=(track==='spinout'?'stage-':'ustage-')+idx;\n    requestAnimationFrame(()=>requestAnimationFrame(()=>{ const el=document.getElementById(id); if(el){ const y=el.getBoundingClientRect().top+window.scrollY-20; window.scrollTo({top:y, behavior:reduce?'auto':'smooth'}); } else { window.scrollTo({top:0, behavior:'auto'}); } }));\n  }\n  renderVals(){\n    const s=this.state;\n    const v={\n      tabs:[{id:'overview',label:'Overview'},{id:'spinout',label:'Spinout'},{id:'startup',label:'Startup'}],\n      activeTab:s.view,\n      setView:(id)=>this.setView(id),\n      showLogo:this.props.showLogo ?? true,\n      showHeroMotif:this.props.showHeroMotif ?? true,\n      showResourceStrip:this.props.showResourceStrip ?? true,\n      isOverview:s.view==='overview',\n      isSpinout:s.view==='spinout',\n      isStartup:s.view==='startup',\n      expandAll:()=>this.setState({sp:[true,true,true,true,true,true]}),\n      collapseAll:()=>this.setState({sp:[false,false,false,false,false,false]}),\n      uexpandAll:()=>this.setState({su:[true,true,true,true,true,true]}),\n      ucollapseAll:()=>this.setState({su:[false,false,false,false,false,false]}),\n    };\n    for(let i=0;i<6;i++){\n      v['o'+i]=s.sp[i]; v['sign'+i]=s.sp[i]?'\\u2212':'+'; v['aria'+i]=s.sp[i];\n      v['toggle'+i]=((self,idx)=>()=>self.setSp(idx,!self.state.sp[idx]))(this,i);\n      v['u'+i]=s.su[i]; v['usign'+i]=s.su[i]?'\\u2212':'+'; v['uaria'+i]=s.su[i];\n      v['utoggle'+i]=((self,idx)=>()=>self.setSu(idx,!self.state.su[idx]))(this,i);\n      v['goSp'+i]=((self,idx)=>()=>self.goStage('spinout',idx))(this,i);\n      v['goSu'+i]=((self,idx)=>()=>self.goStage('startup',idx))(this,i);\n    }\n    return v;\n  }\n}\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
